<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autofill Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Autofill Assistant</h1>
    
    <p class="info">Save your travel details below. The form will auto-fill automatically when you visit the website.</p>

    <label>From Destination</label>
    <select id="fromDestination">
      <option value="">Select From</option>
      <option value="1001">Kochi</option>
      <option value="1002">Beypore</option>
      <option value="1003">Mangalore</option>
      <option value="1004">Androth</option>
      <option value="1005">Kalpeni</option>
      <option value="1006">Agatti</option>
      <option value="1007">Kavaratti</option>
      <option value="1008">Bangaram</option>
      <option value="1009">Minicoy</option>
      <option value="1010">Amini</option>
      <option value="1011">Kadmat</option>
      <option value="1012">Kiltan</option>
      <option value="1013">Chettlat</option>
      <option value="1014">Bitra</option>
    </select>

    <label>To Destination</label>
    <select id="toDestination">
      <option value="">Select To</option>
      <option value="1001">Kochi</option>
      <option value="1002">Beypore</option>
      <option value="1003">Mangalore</option>
      <option value="1004">Androth</option>
      <option value="1005">Kalpeni</option>
      <option value="1006">Agatti</option>
      <option value="1007">Kavaratti</option>
      <option value="1008">Bangaram</option>
      <option value="1009">Minicoy</option>
      <option value="1010">Amini</option>
      <option value="1011">Kadmat</option>
      <option value="1012">Kiltan</option>
      <option value="1013">Chettlat</option>
      <option value="1014">Bitra</option>
    </select>

    <label>Travel Class</label>
    <select id="travelClass">
      <option value="">Select Class</option>
      <option value="SECOND CLASS">SECOND CLASS</option>
      <option value="BUNK CLASS">BUNK CLASS</option>
      <option value="FIRST CLASS">FIRST CLASS</option>
    </select>

    <label>Date</label>
    <input type="date" id="travelDate" />

    <h3>Passengers</h3>
   <div id="passengerList"></div>

<div class="seat-monitor-row">
  <span class="seat-label">Seat Monitor</span>
  
  <label class="switch">
    <input type="checkbox" id="seatMonitorToggle">
    <span class="slider"></span>
  </label>
</div>

    <div class="buttons">
      <button id="saveBtn">Save Profile</button>
    </div>

    <p id="status"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
